<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP Master Data Studio</title>
<style>
  :root {
    --bg: #0c0e11;
    --surface: #13171d;
    --surface2: #1a2028;
    --surface3: #222a35;
    --border: #2b3442;
    --text: #edf1f5;
    --text-dim: #c4ced9;
    --text-muted: #8d99a8;
    --accent: #d6a85a;
    --accent2: #61b6b0;
    --accent3: #7ab6ff;
    --danger: #d66b6b;
    --success: #79be8f;
    --shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    --owner-bg: #f3efe7;
    --owner-surface: rgba(255, 255, 255, 0.92);
    --owner-border: rgba(20, 42, 67, 0.12);
    --owner-text: #1f3045;
    --owner-muted: #64758a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background:
      radial-gradient(circle at top left, rgba(122, 182, 255, 0.08), transparent 28%),
      radial-gradient(circle at top right, rgba(214, 168, 90, 0.08), transparent 30%),
      linear-gradient(180deg, #0a0c0f 0%, #0d1116 100%);
    color: var(--text);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.68;
  }

  button, input, textarea, select { font: inherit; }
  a { color: inherit; }
  .hidden { display: none !important; }
  .mono { font-family: "SFMono-Regular", Consolas, monospace; letter-spacing: 0.03em; }

  .top-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    z-index: 300;
    transition: width 0.25s ease;
  }

  .user-app header {
    position: sticky;
    top: 0;
    z-index: 200;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding: 1rem 2rem;
    background: rgba(12, 14, 17, 0.86);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(14px);
  }

  .header-left, .header-right {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
  }

  .logo {
    color: #d7dee6;
    font-size: 0.78rem;
    text-transform: uppercase;
  }

  .pill, .small-btn, .lang-btn, .jump-btn, .nav-chip, .floating-btn, .ghost-btn, .tab-btn {
    border: 1px solid var(--border);
    background: transparent;
    color: #d0d8e2;
    transition: 0.18s ease;
  }

  .pill {
    padding: 0.42rem 0.72rem;
    font-size: 0.72rem;
  }

  .small-btn, .lang-btn, .jump-btn, .ghost-btn, .tab-btn {
    cursor: pointer;
  }

  .lang-switcher {
    display: flex;
    gap: 0.45rem;
  }

  .lang-btn {
    padding: 0.42rem 0.68rem;
    font-size: 0.74rem;
  }

  .lang-btn.active,
  .small-btn:hover,
  .lang-btn:hover,
  .jump-btn:hover,
  .floating-btn:hover,
  .ghost-btn:hover,
  .tab-btn:hover,
  .nav-chip.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .hero {
    max-width: 1180px;
    margin: 0 auto;
    padding: 5rem 2rem 3rem;
    display: grid;
    grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
    gap: 1.6rem;
    align-items: end;
  }

  .eyebrow {
    color: var(--text-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  h1 {
    font-size: clamp(2.6rem, 5.8vw, 4.9rem);
    line-height: 1.03;
    letter-spacing: -0.03em;
    margin-bottom: 1rem;
  }

  h1 em { font-style: normal; color: var(--accent); }

  .hero-copy {
    color: var(--text-dim);
    font-size: 1.03rem;
    max-width: 760px;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-top: 1.4rem;
  }

  .jump-btn {
    padding: 0.82rem 1rem;
    text-transform: uppercase;
    font-size: 0.76rem;
    letter-spacing: 0.08em;
  }

  .jump-btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }

  .hero-panel, .content-panel, .gui-shell, .editor-panel, .login-panel, .drawer {
    background: rgba(19, 23, 29, 0.96);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .hero-panel {
    padding: 1.35rem;
    display: grid;
    gap: 1rem;
  }

  .stats-grid, .scenario-grid, .insight-grid, .governance-grid, .notebook-grid, .quiz-grid, .owner-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1rem;
  }

  .stats-grid { grid-template-columns: repeat(2, 1fr); }

  .stat-card, .scenario-card, .insight-card, .governance-card, .note-card, .quiz-card {
    padding: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .stat-card strong {
    display: block;
    font-size: 1.32rem;
    margin-bottom: 0.2rem;
  }

  .stat-card span, .helper-copy, .muted, .note-meta {
    color: var(--text-dim);
  }

  main section {
    max-width: 1180px;
    margin: 0 auto;
    padding: 3.4rem 2rem;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: #aab5c2;
    font-size: 0.72rem;
    text-transform: uppercase;
    margin-bottom: 1.15rem;
  }

  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  h2 {
    font-size: clamp(1.9rem, 3.4vw, 2.75rem);
    line-height: 1.14;
    margin-bottom: 0.95rem;
  }

  .section-copy {
    max-width: 820px;
    color: var(--text-dim);
    margin-bottom: 1.8rem;
  }

  .nav-chip-row, .micro-tag-row, .toolbar-row, .tab-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }

  .nav-chip, .micro-tag, .field-chip, .status-badge {
    padding: 0.35rem 0.6rem;
    font-size: 0.72rem;
    border: 1px solid var(--border);
  }

  .nav-chip { cursor: pointer; }

  .master-loop {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 1rem;
  }

  .loop-visual, .loop-detail, .sim-explainer, .sim-main, .sim-side {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .loop-visual, .loop-detail {
    padding: 1.3rem;
  }

  .loop-track {
    display: grid;
    gap: 0.8rem;
  }

  .loop-step {
    padding: 1rem 1rem 0.95rem;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: 0.18s ease;
    position: relative;
    overflow: hidden;
  }

  .loop-step.active,
  .loop-step:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .loop-step::after {
    content: "";
    position: absolute;
    left: -40%;
    top: 0;
    width: 35%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(214, 168, 90, 0.14), transparent);
    animation: sweep 3s infinite;
  }

  @keyframes sweep {
    0% { left: -40%; }
    100% { left: 135%; }
  }

  .card-label {
    color: #aab5c2;
    font-size: 0.72rem;
    text-transform: uppercase;
    margin-bottom: 0.65rem;
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.55rem;
  }

  .list {
    display: grid;
    gap: 0.45rem;
    color: var(--text-dim);
  }

  .list div::before {
    content: "— ";
    color: var(--text-muted);
  }

  .governance-card strong {
    display: block;
    margin-bottom: 0.45rem;
    color: var(--text);
  }

  .insight-card { cursor: pointer; }
  .insight-card.active, .insight-card:hover {
    border-color: var(--accent3);
    transform: translateY(-2px);
  }

  .detail-box {
    margin-top: 1rem;
    padding: 1rem;
    background: rgba(122, 182, 255, 0.05);
    border: 1px solid rgba(122, 182, 255, 0.25);
  }

  .detail-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 0.9rem;
  }

  .ghost-btn {
    padding: 0.62rem 0.82rem;
    font-size: 0.76rem;
  }

  .table-wrap {
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 0.95rem 1rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }

  th {
    color: #b0bcc9;
    text-transform: uppercase;
    font-size: 0.72rem;
  }

  .gui-shell {
    overflow: hidden;
    background: #d8dee8;
    border-color: #8ba0ba;
  }

  .gui-topbar {
    background: linear-gradient(180deg, #b3c8e2 0%, #9ab1cb 100%);
    color: #18304e;
    padding: 0.5rem 0.8rem;
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    font-size: 0.82rem;
    font-weight: 600;
  }

  .gui-menubar, .gui-toolbar {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    flex-wrap: wrap;
    padding: 0.4rem 0.75rem;
    color: #314862;
    background: #e6ebf2;
    border-bottom: 1px solid #b9c6d7;
  }

  .tool-icon {
    width: 22px;
    height: 22px;
    border: 1px solid #9db0c7;
    background: linear-gradient(180deg, #fff 0%, #eef3f9 100%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.74rem;
    cursor: pointer;
  }

  .tool-icon:hover, .tool-icon.active {
    border-color: #5e89bc;
    background: #fff8dc;
  }

  .gui-body {
    display: grid;
    grid-template-columns: 270px minmax(0, 1fr);
    min-height: 720px;
    color: #24384e;
    background: #edf2f8;
  }

  .sim-side {
    background: #dbe5f1;
    border-right: 1px solid #b7c5d8;
    padding: 0.9rem;
  }

  .sim-side h3, .sim-main h3 {
    font-size: 0.78rem;
    text-transform: uppercase;
    color: #54697f;
    margin-bottom: 0.7rem;
  }

  .tree-group { margin-bottom: 1rem; }

  .tree-node {
    padding: 0.45rem 0.5rem;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.4);
    margin-bottom: 0.35rem;
    cursor: pointer;
  }

  .tree-node.active, .tree-node:hover {
    border-color: #7e95b2;
    background: rgba(255,255,255,0.9);
  }

  .sim-main {
    padding: 0.95rem;
    background: #edf2f8;
  }

  .command-strip {
    display: grid;
    grid-template-columns: 92px minmax(0, 1fr) auto;
    gap: 0.6rem;
    align-items: center;
    margin-bottom: 0.9rem;
  }

  .sap-input, .sap-select, .owner-input, .owner-textarea {
    width: 100%;
    border: 1px solid #98abc2;
    background: #fff;
    color: #24384e;
    padding: 0.55rem 0.65rem;
  }

  .sap-run {
    border: 1px solid #6e87a5;
    background: #f8fbff;
    color: #22364e;
    padding: 0.56rem 0.82rem;
    cursor: pointer;
  }

  .sim-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-bottom: 0.85rem;
  }

  .tcode-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.9rem;
  }

  .tcode-btn {
    padding: 0.52rem 0.7rem;
    border: 1px solid #8aa4c4;
    background: #f7fbff;
    color: #24415f;
    cursor: pointer;
    font-size: 0.75rem;
  }

  .tcode-btn.active,
  .tcode-btn:hover {
    border-color: #4f79ac;
    background: #fff3d7;
    color: #1f3550;
  }

  .tab-btn {
    padding: 0.55rem 0.72rem;
    font-size: 0.76rem;
    color: #435a75;
    background: #f2f6fb;
  }

  .tab-btn.active {
    border-color: #6f8fb4;
    background: #ffffff;
    color: #284361;
  }

  .sim-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0.9rem;
  }

  .sim-panel {
    background: #fff;
    border: 1px solid #b7c5d8;
  }

  .sim-panel-head {
    padding: 0.7rem 0.9rem;
    border-bottom: 1px solid #d2dde9;
    background: #f7f9fc;
    color: #3f556e;
    font-size: 0.8rem;
    font-weight: 600;
  }

  .sim-panel-body {
    padding: 0.9rem;
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.7rem;
  }

  .field-card {
    padding: 0.7rem;
    border: 1px solid #d4dfeb;
    background: #fbfdff;
    cursor: pointer;
    min-height: 88px;
  }

  .field-card.active, .field-card:hover {
    border-color: #7aa0cb;
    background: #f2f8ff;
  }

  .field-name {
    font-size: 0.78rem;
    color: #5a6f87;
    margin-bottom: 0.25rem;
  }

  .field-value {
    font-weight: 600;
    color: #1d3148;
    margin-bottom: 0.3rem;
  }

  .field-meta {
    font-size: 0.76rem;
    color: #556a82;
  }

  .sim-table-wrap {
    overflow: auto;
    border-top: 1px solid #d2dde9;
  }

  .sim-table {
    width: 100%;
    border-collapse: collapse;
    color: #23374c;
  }

  .sim-table th, .sim-table td {
    padding: 0.7rem;
    border-bottom: 1px solid #d9e3ee;
    font-size: 0.8rem;
  }

  .sim-table th {
    background: #f4f7fb;
    color: #536881;
  }

  .sim-detail-box {
    padding: 0.8rem;
    background: #f6fbff;
    border: 1px solid #cfdeed;
    color: #38526d;
  }

  .statusbar {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.5rem 0.8rem;
    border-top: 1px solid #b9c6d7;
    background: #d7e1ec;
    color: #3f5871;
    font-size: 0.76rem;
  }

  .notes-wrap {
    display: grid;
    gap: 0.8rem;
  }

  .note-form {
    display: grid;
    gap: 0.75rem;
  }

  .dark-input, .dark-textarea {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    padding: 0.78rem 0.85rem;
  }

  .dark-textarea { min-height: 120px; resize: vertical; }

  .save-btn, .floating-btn {
    cursor: pointer;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: transparent;
  }

  .save-btn {
    padding: 0.76rem 0.95rem;
  }

  .quiz-card.correct { border-color: rgba(121, 190, 143, 0.6); }
  .quiz-card.wrong { border-color: rgba(214, 107, 107, 0.7); }

  .quiz-options {
    display: grid;
    gap: 0.6rem;
    margin-top: 0.9rem;
  }

  .quiz-option {
    width: 100%;
    text-align: left;
    padding: 0.85rem 0.95rem;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
  }

  .quiz-option:hover { border-color: var(--accent); }
  .quiz-feedback { margin-top: 0.9rem; color: var(--text-dim); }

  .floating-btn {
    position: fixed;
    right: 1.3rem;
    bottom: 1.3rem;
    z-index: 260;
    padding: 0.95rem 1.1rem;
    border-radius: 999px;
    background: rgba(19, 23, 29, 0.96);
    box-shadow: var(--shadow);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.48);
    z-index: 340;
    display: none;
  }

  .overlay.active { display: block; }

  .drawer {
    position: fixed;
    right: 1rem;
    bottom: 1rem;
    width: min(460px, calc(100vw - 2rem));
    z-index: 350;
    display: none;
  }

  .drawer.active { display: block; }

  .drawer-head {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: center;
    padding: 1rem 1rem 0.7rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .drawer-body {
    padding: 1rem;
    display: grid;
    gap: 1rem;
  }

  .login-panel {
    padding: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .status-line {
    min-height: 1.2rem;
    font-size: 0.82rem;
    color: var(--accent);
  }

  .owner-app {
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(39, 88, 141, 0.08), transparent 30%),
      linear-gradient(180deg, #f4efe5 0%, #efe9df 100%);
    color: var(--owner-text);
  }

  .owner-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem;
  }

  .owner-header {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1.4rem;
  }

  .owner-title {
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1.04;
    margin-bottom: 0.4rem;
  }

  .owner-sub {
    color: var(--owner-muted);
    max-width: 740px;
  }

  .owner-actions {
    display: flex;
    gap: 0.7rem;
    flex-wrap: wrap;
  }

  .owner-btn {
    border: 1px solid var(--owner-border);
    background: var(--owner-surface);
    color: var(--owner-text);
    cursor: pointer;
    padding: 0.72rem 0.88rem;
    box-shadow: 0 18px 50px rgba(39, 52, 69, 0.08);
  }

  .owner-btn.primary {
    border-color: rgba(37, 110, 98, 0.35);
    color: #256e62;
  }

  .owner-grid {
    grid-template-columns: 1.05fr 0.95fr;
  }

  .editor-panel {
    background: var(--owner-surface);
    border-color: var(--owner-border);
    padding: 1rem;
    color: var(--owner-text);
  }

  .owner-input, .owner-textarea {
    border: 1px solid rgba(38, 59, 84, 0.18);
    color: var(--owner-text);
    background: #fff;
  }

  .owner-textarea {
    min-height: 110px;
    resize: vertical;
  }

  .editor-stack {
    display: grid;
    gap: 0.85rem;
  }

  .preview-box {
    padding: 1rem;
    border: 1px solid rgba(38, 59, 84, 0.12);
    background: rgba(255, 255, 255, 0.66);
  }

  .preview-box h4 {
    font-size: 1rem;
    margin-bottom: 0.5rem;
  }

  @media (max-width: 1024px) {
    .hero,
    .master-loop,
    .sim-grid,
    .owner-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 760px) {
    .user-app header,
    .hero,
    main section,
    .owner-wrap {
      padding-left: 1rem;
      padding-right: 1rem;
    }

    .scenario-grid,
    .insight-grid,
    .governance-grid,
    .stats-grid,
    .notebook-grid,
    .quiz-grid {
      grid-template-columns: 1fr;
    }

    .gui-body {
      grid-template-columns: 1fr;
    }

    .field-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="top-progress" id="topProgress"></div>

<div class="user-app" id="userApp">
  <header>
    <div class="header-left">
      <div class="logo mono" id="logoText">SAP Master Data Studio</div>
      <div class="pill mono" id="offlineBadge">Offline only · Local notes · Demo data</div>
    </div>
    <div class="header-right">
      <div class="lang-switcher">
        <button class="lang-btn mono active" data-lang="zh">中文</button>
        <button class="lang-btn mono" data-lang="en">EN</button>
        <button class="lang-btn mono" data-lang="de">DE</button>
      </div>
      <button class="small-btn mono" id="resetNotesBtn" style="padding:0.42rem 0.68rem;"></button>
    </div>
  </header>

  <section class="hero">
    <div>
      <div class="eyebrow mono" id="heroEyebrow"></div>
      <h1 id="heroTitle"></h1>
      <p class="hero-copy" id="heroCopy"></p>
      <div class="hero-actions">
        <button class="jump-btn primary mono" id="jumpGovernanceBtn"></button>
        <button class="jump-btn mono" id="jumpGuiBtn"></button>
      </div>
      <p class="helper-copy" id="heroHint" style="margin-top:1rem;"></p>
    </div>
    <div class="hero-panel">
      <div class="card-label mono" id="heroPanelLabel"></div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="content-panel" style="padding:1rem;">
        <div class="card-label mono" id="heroQueueLabel"></div>
        <div class="nav-chip-row" id="focusQueue"></div>

  function langCopy() { return copy[app.lang] || copy.zh; }
  function langContent() { return content[app.lang] || content.zh; }

  function saveNotes() {
    localStorage.setItem(NOTES_KEY, JSON.stringify(app.notes));
  }

  function saveUserState() {
    localStorage.setItem(USER_STATE_KEY, JSON.stringify({ quizAnswers: app.quizAnswers }));
  }

  function saveOwnerContent() {
    localStorage.setItem(OWNER_CONTENT_KEY, JSON.stringify(app.ownerContent));
  }

  function setLang(lang) {
    app.lang = lang;
    localStorage.setItem('sapMdLang', lang);
    render();
  }

  function ownerMode() {
    const params = new URLSearchParams(window.location.search);
    return params.get('mode') === 'owner' && sessionStorage.getItem(OWNER_SESSION_KEY) === 'ok';
  }

  function switchMode(mode) {
    const url = new URL(window.location.href);
    if (mode === 'owner') {
      url.searchParams.set('mode', 'owner');
    } else {
      url.searchParams.delete('mode');
    }
    window.location.href = url.toString();
  }

  function ownerExtras() {
    return app.ownerContent;
  }

  function addFocusTerm(label) {
    const queue = document.getElementById('focusQueue');
    const exists = [...queue.children].some(node => node.textContent === label);
    if (exists) return;
    const span = document.createElement('span');
    span.className = 'nav-chip mono active';
    span.textContent = label;
    queue.appendChild(span);
  }

    const ui = langCopy();

    document.getElementById('guiTitle').textContent = ui.guiTitle;
    document.getElementById('guiCopy').textContent = extras.guiExtra ? `${ui.guiCopy} ${extras.guiExtra}` : ui.guiCopy;
    document.getElementById('guiWindowTitle').textContent = ui.guiWindowTitle;
    document.getElementById('guiMenubar').innerHTML = ui.guiMenubar.map(item => `<span>${item}</span>`).join('');
    document.getElementById('guiToolbar').innerHTML = ui.guiToolbar.map((item, index) => `<button type="button" class="tool-icon ${index === 2 ? 'active' : ''}">${item}</button>`).join('');
    document.getElementById('sideNavTitle').textContent = ui.sideNavTitle;
    document.getElementById('sideStepTitle').textContent = ui.sideStepTitle;
    document.getElementById('commandLabel').textContent = ui.commandLabel;
    document.getElementById('simCommand').value = sim.code;
    document.getElementById('simRunBtn').textContent = ui.run;
    document.getElementById('tcodeRow').innerHTML = Object.entries(langContent().sims).map(([key, item]) => `
      <button class="tcode-btn mono ${key === app.simScreen ? 'active' : ''}" data-tcode-screen="${key}">${item.code}</button>
    `).join('') + `<span class="pill mono" style="color:#425d78;border-color:#a8bbd1;background:#f5f9fe;">${ui.tcodeHint}</span>`;
    document.getElementById('primaryPanelTitle').textContent = `${sim.title} · ${tab.name}`;
    document.getElementById('secondaryPanelTitle').textContent = ui.secondaryPanelTitle;
    document.getElementById('fieldInfoLabel').textContent = ui.fieldInfoLabel;
    document.getElementById('tcodeInfoLabel').textContent = ui.tcodeInfoLabel;
    document.getElementById('simLessonLabel').textContent = ui.simLessonLabel;
    document.getElementById('statusLeft').textContent = ui.statusLeft;
    document.getElementById('statusRight').textContent = `${sim.code} / ${tab.name}`;

    const screens = Object.keys(langContent().sims);
    document.getElementById('simLauncher').innerHTML = screens.map(key => `
      <div class="tree-node ${key === app.simScreen ? 'active' : ''}" data-screen="${key}">${langContent().sims[key].title}</div>
    `).join('');
    document.querySelectorAll('[data-screen]').forEach(node => {
      node.onclick = () => {
        app.simScreen = node.dataset.screen;
        app.simTab = 0;
        app.simField = 0;
        renderSimulator();
      };
    });

    document.querySelectorAll('[data-tcode-screen]').forEach(node => {
      node.onclick = () => {
        app.simScreen = node.dataset.tcodeScreen;
        app.simTab = 0;
        app.simField = 0;
        renderSimulator();
      };
    });

    document.getElementById('simTree').innerHTML = sim.tree.map((item, index) => `
      <div class="tree-node ${index === app.simTab ? 'active' : ''}" data-tree="${index}">${item}</div>
    `).join('');
    document.querySelectorAll('[data-tree]').forEach(node => {
      node.onclick = () => {
        const idx = Number(node.dataset.tree);
        app.simTab = idx < sim.tabs.length ? idx : 0;
        app.simField = 0;
        renderSimulator();
      };
    });

    document.getElementById('simTabs').innerHTML = sim.tabs.map((item, index) => `
      <button class="tab-btn ${index === app.simTab ? 'active' : ''}" data-tab="${index}">${item.name}</button>
    `).join('');
    document.querySelectorAll('[data-tab]').forEach(node => {
      node.onclick = () => {
        app.simTab = Number(node.dataset.tab);
        app.simField = 0;
        renderSimulator();
      };
    });

    document.getElementById('fieldGrid').innerHTML = tab.fields.map((item, index) => `
      <div class="field-card ${index === app.simField ? 'active' : ''}" data-field="${index}">
        <div class="field-name">${item.name}</div>
        <div class="field-value">${item.value}</div>
        <div class="field-meta">${item.meta}</div>
      </div>
    `).join('');
    document.querySelectorAll('[data-field]').forEach(node => {
      node.onclick = () => {
        app.simField = Number(node.dataset.field);
        renderSimulator();
      };
    });

    document.getElementById('fieldInfoTitle').textContent = `${field.name} · ${field.value}`;
    document.getElementById('fieldInfoCopy').textContent = field.explain;
    document.getElementById('tcodeInfoTitle').textContent = sim.code;
    document.getElementById('tcodeInfoCopy').textContent = sim.tcodeInfo;
    document.getElementById('simLessonList').innerHTML = sim.lessons.map(item => `<div>${item}</div>`).join('');
    document.getElementById('simTableHead').innerHTML = `<tr>${tab.table.head.map(item => `<th>${item}</th>`).join('')}</tr>`;
    document.getElementById('simTableBody').innerHTML = tab.table.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('');
  }

  function renderQuality() {
    const ui = langCopy();
    document.getElementById('qualityLabel').textContent = ui.qualityLabel;
    document.getElementById('qualityTitle').textContent = ui.qualityTitle;
    document.getElementById('qualityCopy').textContent = ui.qualityCopy;
    document.getElementById('qualityGrid').innerHTML = langContent().quality.map(item => `
      <div class="governance-card">
        <strong>${item[0]}</strong>
        <p class="muted">${item[1]}</p>
      </div>
    `).join('');
  }

  function renderNotes() {
    const ui = langCopy();
    document.getElementById('notesLabel').textContent = ui.notesLabel;
    document.getElementById('notesTitle').textContent = ui.notesTitle;
    document.getElementById('notesCopy').textContent = ui.notesCopy;
    document.getElementById('noteFormLabel').textContent = ui.noteFormLabel;
    document.getElementById('noteListLabel').textContent = ui.noteListLabel;
    document.getElementById('noteTitleInput').placeholder = ui.noteTitlePlaceholder;
    document.getElementById('noteBodyInput').placeholder = ui.noteBodyPlaceholder;
    document.getElementById('saveNoteBtn').textContent = ui.saveNote;
    const list = document.getElementById('noteList');
    if (!app.notes.length) {
      list.innerHTML = `<div class="note-card"><div class="note-meta">${ui.noteEmpty}</div></div>`;
      return;
    }
    list.innerHTML = app.notes.map(note => `
      <div class="note-card">
        <div class="card-title" style="font-size:1rem;">${note.title}</div>
        <div class="note-meta mono" style="margin-bottom:0.55rem;">${note.createdAt}</div>
        <p class="muted" style="margin-bottom:0.7rem;">${note.body}</p>
        <button class="ghost-btn mono" data-note-delete="${note.id}">${ui.noteDelete}</button>
      </div>
    `).join('');
    document.querySelectorAll('[data-note-delete]').forEach(node => {
      node.onclick = () => {
        app.notes = app.notes.filter(item => item.id !== node.dataset.noteDelete);
        saveNotes();
        renderNotes();
      };
    });
  }

  function renderQuiz() {
    const ui = langCopy();
    document.getElementById('quizLabel').textContent = ui.quizLabel;
    document.getElementById('quizTitle').textContent = ui.quizTitle;
    document.getElementById('quizCopy').textContent = ui.quizCopy;
    const quizzes = langContent().quizzes;
    document.getElementById('quizGrid').innerHTML = quizzes.map((item, index) => {
      const selected = app.quizAnswers[index];
      const done = typeof selected === 'number';
      const cls = done ? (selected === item.correct ? 'correct' : 'wrong') : '';
      return `
        <div class="quiz-card content-panel ${cls}" style="padding:1rem;">
          <div class="card-label mono">Q${index + 1}</div>
          <div class="card-title">${item.q}</div>
          <div class="quiz-options">
            ${item.options.map((opt, idx) => `<button class="quiz-option" data-quiz="${index}" data-answer="${idx}" ${done ? 'disabled' : ''}>${opt}</button>`).join('')}
          </div>
          <div class="quiz-feedback">${done ? (selected === item.correct ? ui.quizCorrect : ui.quizWrong) : ''}</div>
        </div>
      `;
    }).join('');
    document.querySelectorAll('[data-quiz]').forEach(node => {
      node.onclick = () => {
        app.quizAnswers[node.dataset.quiz] = Number(node.dataset.answer);
        saveUserState();
        renderQuiz();
      };
    });
  }

  function renderDrawer() {
    const ui = langCopy();
    document.getElementById('drawerLabel').textContent = ui.drawerLabel;
    document.getElementById('drawerTitle').textContent = ui.drawerTitle;
    document.getElementById('drawerCopy').textContent = ui.drawerCopy;
    document.getElementById('ownerUserInput').placeholder = ui.ownerUserPlaceholder;
    document.getElementById('ownerPassInput').placeholder = ui.ownerPassPlaceholder;
    document.getElementById('ownerLoginBtn').textContent = ui.ownerLogin;
    document.getElementById('sourceLabel').textContent = ui.sourceLabel;
    document.getElementById('sourceList').innerHTML = ui.sourceList.map(item => `<div>${item}</div>`).join('');
  }

  function renderOwnerPage() {
    const ui = langCopy();
    document.getElementById('ownerEyebrow').textContent = ui.ownerEyebrow;
    document.getElementById('ownerPageTitle').textContent = ui.ownerPageTitle;
    document.getElementById('ownerPageCopy').textContent = ui.ownerPageCopy;
    document.getElementById('previewBtn').textContent = ui.previewBtn;
    document.getElementById('saveOwnerBtn').textContent = ui.saveOwner;
    document.getElementById('resetOwnerBtn').textContent = ui.resetOwner;
    document.getElementById('exitOwnerBtn').textContent = ui.exitOwner;
    document.getElementById('ownerEditLabel').textContent = ui.ownerEditLabel;
    document.getElementById('ownerPreviewLabel').textContent = ui.ownerPreviewLabel;
    document.getElementById('ownerHeroLabel').textContent = ui.ownerHeroLabel;
    document.getElementById('ownerScenarioLabel').textContent = ui.ownerScenarioLabel2;
    document.getElementById('ownerLoopLabel').textContent = ui.ownerLoopLabel;
    document.getElementById('ownerGuiLabel').textContent = ui.ownerGuiLabel;
    document.getElementById('ownerHeroInput').value = app.ownerContent.heroExtra || '';
    document.getElementById('ownerScenarioInput').value = app.ownerContent.scenarioExtra || '';
    document.getElementById('ownerLoopInput').value = app.ownerContent.loopExtra || '';
    document.getElementById('ownerGuiInput').value = app.ownerContent.guiExtra || '';
    document.getElementById('previewHeroTitle').textContent = ui.previewHeroTitle;
    document.getElementById('previewScenarioTitle').textContent = ui.previewScenarioTitle;
    document.getElementById('previewLoopTitle').textContent = ui.previewLoopTitle;
    document.getElementById('previewGuiTitle').textContent = ui.previewGuiTitle;
    document.getElementById('previewHeroCopy').textContent = app.ownerContent.heroExtra || '—';
    document.getElementById('previewScenarioCopy').textContent = app.ownerContent.scenarioExtra || '—';
    document.getElementById('previewLoopCopy').textContent = app.ownerContent.loopExtra || '—';
    document.getElementById('previewGuiCopy').textContent = app.ownerContent.guiExtra || '—';
  }

  function renderMode() {
    const isOwner = ownerMode();
    document.getElementById('userApp').classList.toggle('hidden', isOwner);
    document.getElementById('ownerApp').classList.toggle('hidden', !isOwner);
    if (isOwner) {
      renderOwnerPage();
    }
  }

  function render() {
    renderMode();
    if (ownerMode()) return;
    renderHero();
    renderRoadmap();
    renderGovernance();
    renderDomains();
    renderStructure();
    renderSimulator();
    renderQuality();
    renderNotes();
    renderQuiz();
    renderDrawer();
  }

  function openDrawer() {
    document.getElementById('overlay').classList.add('active');
    document.getElementById('ownerDrawer').classList.add('active');
    document.getElementById('ownerLoginStatus').textContent = '';
  }

  function closeDrawer() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('ownerDrawer').classList.remove('active');
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLang(btn.dataset.lang));
  });

  document.getElementById('jumpGovernanceBtn').onclick = () => document.getElementById('governanceSection').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('jumpGuiBtn').onclick = () => document.getElementById('guiSection').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('openOwnerBtn').onclick = openDrawer;
  document.getElementById('closeDrawerBtn').onclick = closeDrawer;
  document.getElementById('overlay').onclick = closeDrawer;

  document.getElementById('ownerLoginBtn').onclick = () => {
    const username = document.getElementById('ownerUserInput').value.trim();
    const password = document.getElementById('ownerPassInput').value.trim();
    if (username !== OWNER_USERNAME || password !== OWNER_PASSWORD) {
      document.getElementById('ownerLoginStatus').textContent = langCopy().ownerLoginFail;
      return;
    }
    sessionStorage.setItem(OWNER_SESSION_KEY, 'ok');
    const url = new URL(window.location.href);
    url.searchParams.set('mode', 'owner');
    window.open(url.toString(), '_blank', 'noopener');
    closeDrawer();
  };

  document.getElementById('saveNoteBtn').onclick = () => {
    const title = document.getElementById('noteTitleInput').value.trim();
    const body = document.getElementById('noteBodyInput').value.trim();
    if (!title || !body) return;
    app.notes.unshift({
      id: `note-${Date.now()}`,
      title,
      body,
      createdAt: new Date().toLocaleString('zh-CN')
    });
    app.notes = app.notes.slice(0, 24);
    saveNotes();
    document.getElementById('noteTitleInput').value = '';
    document.getElementById('noteBodyInput').value = '';
    document.getElementById('noteStatus').textContent = langCopy().noteSaved;
    renderNotes();
  };

  document.getElementById('resetNotesBtn').onclick = () => {
    app.notes = [];
    app.quizAnswers = {};
    saveNotes();
    saveUserState();
    renderNotes();
    renderQuiz();
  };

  document.getElementById('previewBtn').onclick = () => {
    const url = new URL(window.location.href);
    url.searchParams.delete('mode');
    window.open(url.toString(), '_blank', 'noopener');
  };
  document.getElementById('exitOwnerBtn').onclick = () => {
    sessionStorage.removeItem(OWNER_SESSION_KEY);
    switchMode('user');
  };

  document.getElementById('saveOwnerBtn').onclick = () => {
    app.ownerContent.heroExtra = document.getElementById('ownerHeroInput').value.trim();
    app.ownerContent.scenarioExtra = document.getElementById('ownerScenarioInput').value.trim();
    app.ownerContent.loopExtra = document.getElementById('ownerLoopInput').value.trim();
    app.ownerContent.guiExtra = document.getElementById('ownerGuiInput').value.trim();
    saveOwnerContent();
    document.getElementById('ownerStatus').textContent = langCopy().ownerSaved;
    renderOwnerPage();
  };

  document.getElementById('resetOwnerBtn').onclick = () => {
    app.ownerContent = defaultOwnerContent();
    saveOwnerContent();
    document.getElementById('ownerStatus').textContent = langCopy().ownerResetDone;
    renderOwnerPage();
  };

  window.addEventListener('scroll', () => {
    const top = document.documentElement.scrollTop || document.body.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    document.getElementById('topProgress').style.width = `${height ? (top / height) * 100 : 0}%`;
  });

  render();
</script>
</body>
</html>
