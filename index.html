<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP for FMCG - Offline Learning Studio</title>
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1f1f1f;
    --surface3: #252525;
    --border: #2a2a2a;
    --text: #e8e2d9;
    --text-dim: #9a958f;
    --text-muted: #5e5955;
    --accent: #d4a84b;
    --accent2: #6bb89e;
    --accent3: #c96b5a;
    --mm: #5b8dd9;
    --scm: #58b2a9;
    --fi: #6bb89e;
    --cust: #d4a84b;
    --sapbar: #d5d8df;
    --sappanel: #edf1f7;
    --sapline: #b6c1d0;
    --saptext: #223046;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background:
      radial-gradient(circle at top left, rgba(212, 168, 75, 0.08), transparent 30%),
      radial-gradient(circle at top right, rgba(91, 141, 217, 0.09), transparent 28%),
      linear-gradient(180deg, #0d0d0d 0%, #111 100%);
    color: var(--text);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans", Arial, sans-serif;
    line-height: 1.65;
    overflow-x: hidden;
  }

  button, input, select, textarea {
    font: inherit;
  }

  .mono {
    font-family: "Consolas", "SFMono-Regular", "Liberation Mono", monospace;
    letter-spacing: 0.03em;
  }

  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--mm));
    z-index: 300;
    transition: width 0.25s ease;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 200;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(14, 14, 14, 0.88);
    backdrop-filter: blur(14px);
  }

  .logo {
    color: var(--text-dim);
    font-size: 0.76rem;
    text-transform: uppercase;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .pill {
    padding: 0.38rem 0.72rem;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.72rem;
    background: rgba(255, 255, 255, 0.02);
  }

  .lang-switcher {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .lang-btn,
  .mini-btn,
  .btn,
  .sim-tab,
  .course-tab {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: 0.18s ease;
  }

  .lang-btn {
    padding: 0.4rem 0.7rem;
    font-size: 0.72rem;
  }

  .lang-btn.active,
  .mini-btn:hover,
  .btn:hover,
  .sim-tab.active,
  .course-tab.active,
  .lang-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .hero {
    max-width: 1160px;
    margin: 0 auto;
    padding: 5.2rem 2rem 3.2rem;
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
    gap: 2rem;
    align-items: end;
  }

  .eyebrow {
    color: var(--text-muted);
    font-size: 0.74rem;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  h1 {
    font-size: clamp(2.6rem, 6vw, 4.8rem);
    line-height: 1.02;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 1.3rem;
  }

  h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .hero-desc {
    max-width: 700px;
    color: var(--text-dim);
    font-size: 1.04rem;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    margin-top: 1.6rem;
  }

  .btn {
    padding: 0.82rem 1.15rem;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }

  .hero-panel,
  .content-card,
  .module-detail,
  .simulator-wrap,
  .case-grid,
  .quiz-container,
  .table-wrap,
  .roadmap {
    background: rgba(22, 22, 22, 0.95);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .hero-panel {
    padding: 1.4rem;
    display: grid;
    gap: 1rem;
  }

  .hero-hint {
    margin-top: 0.95rem;
    color: var(--text-muted);
    font-size: 0.84rem;
  }

  .hero-panel-title {
    color: var(--text-muted);
    font-size: 0.72rem;
    text-transform: uppercase;
  }

  .hero-stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.8rem;
  }

  .hero-stat {
    padding: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .hero-stat strong {
    display: block;
    font-size: 1.3rem;
    color: var(--text);
    margin-bottom: 0.2rem;
  }

  .hero-stat span {
    color: var(--text-dim);
    font-size: 0.82rem;
  }

  .focus-box {
    padding: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .focus-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }

  .focus-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.28rem 0.55rem;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 0.72rem;
    background: rgba(212, 168, 75, 0.08);
  }

  .focus-tag button {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-size: 0.82rem;
    line-height: 1;
  }

  main section {
    max-width: 1160px;
    margin: 0 auto;
    padding: 4rem 2rem;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }

  main section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .section-label {
    display: flex;
    gap: 1rem;
    align-items: center;
    color: var(--text-muted);
    font-size: 0.72rem;
    margin-bottom: 1.3rem;
    text-transform: uppercase;
  }

  .section-label::after {
    content: "";
    height: 1px;
    background: var(--border);
    flex: 1;
  }

  h2 {
    font-size: clamp(1.8rem, 3.4vw, 2.6rem);
    line-height: 1.12;
    margin-bottom: 1rem;
  }

  .section-intro {
    color: var(--text-dim);
    max-width: 780px;
    margin-bottom: 2rem;
  }

  .roadmap {
    padding: 1.5rem;
  }

  .roadmap-head,
  .quiz-head {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1.3rem;
  }

  .roadmap-track,
  .quiz-track {
    height: 4px;
    background: var(--border);
    overflow: hidden;
  }

  .roadmap-fill,
  .quiz-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.25s ease;
  }

  .course-tabs,
  .sim-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
    margin-bottom: 1.2rem;
  }

  .course-tab,
  .sim-tab {
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
  }

  .course-panel,
  .sim-panel {
    display: none;
  }

  .course-panel.active,
  .sim-panel.active,
  .module-detail.active {
    display: block;
  }

  .lesson-grid,
  .module-grid,
  .safe-grid,
  .case-grid,
  .customer-grid,
  .finance-grid,
  .supply-grid,
  .scenario-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1rem;
  }

  .lesson-block,
  .module-card,
  .module-mini,
  .safe-card,
  .case-card,
  .scenario-card,
  .explain-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.2rem;
  }

  .scenario-card {
    border-left: 3px solid var(--accent);
  }

  .card-label {
    color: var(--text-muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    margin-bottom: 0.7rem;
  }

  .card-title {
    font-size: 1.08rem;
    margin-bottom: 0.6rem;
    font-weight: 700;
  }

  .list {
    display: grid;
    gap: 0.45rem;
    color: var(--text-dim);
    font-size: 0.92rem;
  }

  .list div::before {
    content: "— ";
    color: var(--text-muted);
  }

  .flow-container {
    overflow-x: auto;
    padding: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .flow-row {
    min-width: 980px;
    display: flex;
    align-items: stretch;
    gap: 0.7rem;
  }

  .flow-step {
    width: 210px;
    cursor: pointer;
  }

  .flow-box {
    height: 100%;
    padding: 1rem;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  }

  .flow-step:hover .flow-box,
  .flow-step.active .flow-box {
    transform: translateY(-4px);
    border-color: currentColor;
  }

  .flow-step.mm { color: var(--mm); }
  .flow-step.scm { color: var(--scm); }
  .flow-step.fi { color: var(--fi); }
  .flow-step.cust { color: var(--cust); }

  .flow-box h3 {
    color: var(--text);
    font-size: 1rem;
    margin: 0.4rem 0;
  }

  .flow-box p {
    color: var(--text-dim);
    font-size: 0.84rem;
  }

  .flow-arrow {
    display: flex;
    align-items: center;
    color: var(--text-muted);
    font-size: 1.2rem;
  }

  .module-detail {
    display: none;
    margin-top: 1rem;
    padding: 1.4rem;
  }

  .detail-head {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1rem;
  }

  .detail-title {
    font-size: 1.05rem;
    font-weight: 700;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 1rem;
  }

  .tag-row,
  .micro-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-top: 0.75rem;
  }

  .tag,
  .tcode-tag,
  .status-badge {
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--border);
    padding: 0.25rem 0.5rem;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  .tcode-tag {
    cursor: pointer;
  }

  .glossary-term {
    color: var(--accent);
    border-bottom: 1px dashed rgba(212, 168, 75, 0.6);
    cursor: pointer;
    transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  }

  .glossary-term:hover {
    color: #f0c86e;
    border-color: #f0c86e;
    background: rgba(212, 168, 75, 0.08);
  }

  .tag.mm { border-color: var(--mm); color: var(--mm); }
  .tag.scm { border-color: var(--scm); color: var(--scm); }
  .tag.fi { border-color: var(--fi); color: var(--fi); }
  .tag.cust { border-color: var(--cust); color: var(--cust); }

  .table-wrap {
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 1rem 1rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
    font-size: 0.9rem;
  }

  th {
    color: var(--text-muted);
    font-size: 0.72rem;
    text-transform: uppercase;
  }

  tbody tr:hover td {
    background: rgba(255, 255, 255, 0.02);
  }

  .simulator-wrap {
    padding: 1.4rem;
  }

  .sim-head {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .simulator-box {
    border: 1px solid #6d7d94;
    background: var(--sapbar);
    overflow: hidden;
  }

  .sap-titlebar {
    background: linear-gradient(180deg, #9eb2cc 0%, #879eba 100%);
    color: #18263a;
    padding: 0.55rem 0.85rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
    font-weight: 600;
  }

  .sap-toolbar {
    display: flex;
    gap: 0.55rem;
    flex-wrap: wrap;
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid var(--sapline);
    background: #dfe5ee;
    color: var(--saptext);
    font-size: 0.78rem;
  }

  .sap-shell {
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr);
    min-height: 560px;
    background: var(--sappanel);
    color: var(--saptext);
  }

  .sap-side {
    background: #dbe4f0;
    border-right: 1px solid var(--sapline);
    padding: 1rem;
  }

  .sap-side h3,
  .sap-main h3 {
    font-size: 0.78rem;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    color: #4d5e77;
  }

  .sap-tree {
    display: grid;
    gap: 0.45rem;
    font-size: 0.84rem;
  }

  .sap-tree div {
    padding: 0.4rem 0.5rem;
    border: 1px solid transparent;
    background: rgba(255, 255, 255, 0.35);
  }

  .sap-tree div.active {
    border-color: #8095b2;
    background: rgba(255, 255, 255, 0.8);
  }

  .sap-main {
    padding: 1rem;
  }

  .sap-command {
    display: grid;
    grid-template-columns: 120px minmax(0, 1fr) auto;
    gap: 0.6rem;
    margin-bottom: 1rem;
    align-items: center;
  }

  .sap-label {
    font-size: 0.8rem;
    color: #4d5e77;
  }

  .sap-input,
  .sap-select {
    border: 1px solid #96a6bc;
    background: #fff;
    color: #263449;
    padding: 0.55rem 0.65rem;
  }

  .sap-run {
    border: 1px solid #7489a7;
    background: #f8fbff;
    color: #263449;
    padding: 0.58rem 0.95rem;
    cursor: pointer;
  }

  .sap-info-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.85rem;
    margin-bottom: 1rem;
  }

  .sap-panel {
    background: #ffffff;
    border: 1px solid #b7c5d8;
    padding: 0.9rem;
  }

  .sap-panel h4 {
    font-size: 0.84rem;
    margin-bottom: 0.55rem;
    color: #334661;
  }

  .sap-table-wrap {
    overflow: auto;
    border: 1px solid #b7c5d8;
    background: #fff;
  }

  .sap-table {
    min-width: 680px;
    color: #263449;
  }

  .sap-table th,
  .sap-table td {
    border-bottom: 1px solid #d6dfeb;
    padding: 0.7rem;
    font-size: 0.8rem;
  }

  .sap-table th {
    color: #536681;
    background: #f4f7fb;
  }

  .safe-grid {
    margin-top: 1.2rem;
  }

  .safe-card strong {
    display: block;
    margin-bottom: 0.45rem;
  }

  .quiz-container {
    padding: 1.5rem;
  }

  .quiz-question {
    font-size: 1.1rem;
    margin-bottom: 0.75rem;
    font-weight: 700;
  }

  .quiz-context {
    color: var(--text-dim);
    margin-bottom: 1rem;
    padding: 0.9rem 1rem;
    border-left: 2px solid var(--border);
    background: rgba(255, 255, 255, 0.02);
  }

  .quiz-options {
    display: grid;
    gap: 0.7rem;
  }

  .quiz-option {
    padding: 0.95rem 1rem;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    text-align: left;
    cursor: pointer;
  }

  .quiz-option.correct {
    border-color: var(--fi);
    color: var(--fi);
  }

  .quiz-option.wrong {
    border-color: var(--accent3);
    color: var(--accent3);
  }

  .quiz-option[disabled] {
    cursor: default;
    opacity: 0.96;
  }

  .quiz-feedback {
    margin-top: 1rem;
    padding: 1rem;
    display: none;
    color: var(--text-dim);
    background: rgba(255, 255, 255, 0.03);
  }

  .quiz-feedback.show {
    display: block;
  }

  .quiz-nav {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 1rem;
  }

  .glossary-card {
    position: fixed;
    right: 1.2rem;
    bottom: 1.2rem;
    width: min(420px, calc(100vw - 2rem));
    background: rgba(17, 17, 17, 0.98);
    border: 1px solid var(--accent);
    box-shadow: var(--shadow);
    z-index: 400;
    display: none;
  }

  .glossary-card.active {
    display: block;
    animation: liftIn 0.24s ease;
  }

  @keyframes liftIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .glossary-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.95rem 1rem 0.6rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .glossary-card-body {
    padding: 1rem;
  }

  .glossary-meta {
    color: var(--text-muted);
    font-size: 0.72rem;
    text-transform: uppercase;
  }

  .glossary-title {
    font-size: 1.15rem;
    margin-top: 0.25rem;
    font-weight: 700;
  }

  .glossary-close {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1rem;
  }

  .glossary-copy {
    color: var(--text-dim);
    font-size: 0.9rem;
    line-height: 1.7;
    margin-bottom: 0.8rem;
  }

  .glossary-subtitle {
    color: var(--text-muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    margin-top: 1rem;
    margin-bottom: 0.4rem;
  }

  .glossary-animation {
    display: flex;
    gap: 0.45rem;
    align-items: center;
    margin: 0.85rem 0 0.45rem;
  }

  .glossary-dot {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: var(--accent);
    animation: pulseChain 1.2s infinite ease-in-out;
  }

  .glossary-dot:nth-child(2) { animation-delay: 0.16s; }
  .glossary-dot:nth-child(3) { animation-delay: 0.32s; }

  @keyframes pulseChain {
    0%, 100% { opacity: 0.28; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.14); }
  }

  .glossary-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .glossary-actions a,
  .glossary-actions button {
    padding: 0.62rem 0.85rem;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: var(--surface2);
    text-decoration: none;
    cursor: pointer;
    font-size: 0.76rem;
  }

  .glossary-actions a:hover,
  .glossary-actions button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .glossary-empty {
    color: var(--text-muted);
    font-size: 0.84rem;
  }

  footer {
    max-width: 1160px;
    margin: 0 auto;
    padding: 2.5rem 2rem 3rem;
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    color: var(--text-muted);
    font-size: 0.74rem;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 980px) {
    .hero,
    .detail-grid,
    .sap-shell,
    .lesson-grid,
    .module-grid,
    .safe-grid,
    .scenario-grid,
    .case-grid {
      grid-template-columns: 1fr;
    }

    .sap-command,
    .hero-stat-grid,
    .sap-info-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 720px) {
    header,
    .hero,
    main section,
    footer {
      padding-left: 1rem;
      padding-right: 1rem;
    }

    header,
    footer,
    .roadmap-head,
    .quiz-head,
    .sim-head {
      flex-direction: column;
      align-items: flex-start;
    }

    .glossary-card {
      right: 1rem;
      bottom: 1rem;
    }

  function t() {
    return i18n[app.lang];
  }

  function g() {
    return glossary[app.lang];
  }

  function glossaryById(id) {
    return g().find(item => item.id === id);
  }

  function getFocusTerms() {
    return JSON.parse(localStorage.getItem('sapOfflineFocusTerms') || '[]');
  }

  function setFocusTerms(terms) {
    localStorage.setItem('sapOfflineFocusTerms', JSON.stringify(terms));
  }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise(resolve => {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
      resolve();
    });
  }

  function buildCopilotPrompt(entry) {
    return `Explain the SAP term "${entry.title}" to a beginner working in FMCG.\n\nPlease answer in ${app.lang === 'zh' ? 'Chinese' : app.lang === 'de' ? 'German' : 'English'} and cover:\n1. What it is in plain language\n2. Why it matters in SAP S/4\n3. Which transaction or screen it connects to\n4. One concrete business example\n5. What data mistake beginners often make around it`;
  }

  function renderFocus() {
    const copy = t();
    const focusTerms = getFocusTerms();
    document.getElementById('focusTitle').textContent = copy.focusTitle;
    document.getElementById('focusDesc').textContent = copy.focusDesc;
    const box = document.getElementById('focusTags');
    box.innerHTML = '';
    if (!focusTerms.length) {
      box.innerHTML = `<span class="glossary-empty">${copy.focusDesc}</span>`;
      return;
    }
    focusTerms.forEach(id => {
      const entry = glossaryById(id);
      if (!entry) return;
      const tag = document.createElement('span');
      tag.className = 'focus-tag mono';
      tag.innerHTML = `${entry.title} <button type="button" data-remove-focus="${id}">×</button>`;
      box.appendChild(tag);
    });
    box.querySelectorAll('[data-remove-focus]').forEach(btn => {
      btn.onclick = () => {
        setFocusTerms(getFocusTerms().filter(item => item !== btn.dataset.removeFocus));
        renderFocus();
      };
    });
  }

  function addFocusTerm(id) {
    const current = getFocusTerms();
    if (!current.includes(id)) {
      current.push(id);
      setFocusTerms(current);
      renderFocus();
    }
  }

  function closeGlossary() {
    app.activeGlossaryId = null;
    document.getElementById('glossaryCard').classList.remove('active');
  }

  function openGlossary(id) {
    const copy = t();
    const entry = glossaryById(id);
    if (!entry) return;
    app.activeGlossaryId = id;
    document.getElementById('glossaryMeta').textContent = copy.glossaryMetaLabel;
    document.getElementById('glossaryTitle').textContent = entry.title;
    document.getElementById('glossaryPlain').textContent = entry.plain;
    document.getElementById('glossaryWhyLabel').textContent = copy.glossaryWhyLabel;
    document.getElementById('glossaryWhy').textContent = entry.why;
    document.getElementById('glossaryExampleLabel').textContent = copy.glossaryExampleLabel;
    document.getElementById('glossaryExample').textContent = entry.example;
    const prompt = buildCopilotPrompt(entry);
    const googleUrl = `https://www.google.com/search?q=${encodeURIComponent(entry.search)}`;
    const sapUrl = `https://www.google.com/search?q=${encodeURIComponent(`site:help.sap.com ${entry.search}`)}`;
    document.getElementById('glossaryActions').innerHTML = `
      <a href="${googleUrl}" target="_blank" rel="noreferrer">${copy.glossaryActions.google}</a>
      <a href="${sapUrl}" target="_blank" rel="noreferrer">${copy.glossaryActions.sap}</a>
      <button type="button" id="copyCopilotPromptBtn">${copy.glossaryActions.copilot}</button>
      <button type="button" id="addFocusBtn">${copy.glossaryActions.focus}</button>
    `;
    document.getElementById('copyCopilotPromptBtn').onclick = async () => {
      await copyText(prompt);
      document.getElementById('copyCopilotPromptBtn').textContent = copy.glossaryActions.copied;
      setTimeout(() => {
        const btn = document.getElementById('copyCopilotPromptBtn');
        if (btn) btn.textContent = copy.glossaryActions.copilot;
      }, 1200);
      window.open('https://copilot.microsoft.com/', '_blank', 'noopener');
    };
    document.getElementById('addFocusBtn').onclick = () => addFocusTerm(id);
    document.getElementById('glossaryCard').classList.add('active');
  }

  function escapeRegExp(value) {
    return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function enhanceGlossary(root) {
    const terms = [...g()].sort((a, b) => b.key.length - a.key.length);
    const map = new Map(terms.map(term => [term.key, term]));
    const pattern = new RegExp(terms.map(term => escapeRegExp(term.key)).join('|'), 'g');
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
        const parent = node.parentElement;
        if (!parent) return NodeFilter.FILTER_REJECT;
        if (parent.closest('.glossary-card, .glossary-term, .focus-tag, .glossary-actions')) return NodeFilter.FILTER_REJECT;
        if (['SCRIPT', 'STYLE', 'TEXTAREA', 'INPUT', 'SELECT', 'OPTION', 'BUTTON'].includes(parent.tagName)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);
    textNodes.forEach(node => {
      const text = node.nodeValue;
      pattern.lastIndex = 0;
      if (!pattern.test(text)) return;
      pattern.lastIndex = 0;
      const fragment = document.createDocumentFragment();
      let lastIndex = 0;
      let match;
      while ((match = pattern.exec(text))) {
        if (match.index > lastIndex) fragment.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
        const key = match[0];
        const term = map.get(key);
        const span = document.createElement('span');
        span.className = 'glossary-term';
        span.dataset.glossaryId = term.id;
        span.textContent = key;
        fragment.appendChild(span);
        lastIndex = match.index + key.length;
      }
      if (lastIndex < text.length) fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
      node.parentNode.replaceChild(fragment, node);
    });
  }

  function saveQuizState() {
    localStorage.setItem('sapOfflineQuizState', JSON.stringify(app.answered));
  }

  function getProgressState() {
    return JSON.parse(localStorage.getItem('sapOfflineModuleState') || '{}');
  }

  function setProgressState(state) {
    localStorage.setItem('sapOfflineModuleState', JSON.stringify(state));
  }

  function markCourseDone(index) {
    const state = getProgressState();
    state[index] = true;
    setProgressState(state);
    renderRoadmap();
  }

  function resetProgress() {
    localStorage.removeItem('sapOfflineModuleState');
    app.answered = new Array(t().questions.length).fill(false);
    saveQuizState();
    app.currentQuestion = 0;
    renderRoadmap();
    renderQuiz();
  }

  function renderHero() {
    const copy = t();
    document.documentElement.lang = app.lang === 'zh' ? 'zh-CN' : app.lang;
    document.title = copy.logo;
    document.getElementById('logoText').textContent = copy.logo;
    document.getElementById('offlineBadge').textContent = copy.offlineBadge;
    document.getElementById('heroEyebrow').textContent = copy.heroEyebrow;
    document.getElementById('heroTitle').innerHTML = copy.heroTitle;
    document.getElementById('heroDesc').textContent = copy.heroDesc;
    document.getElementById('heroPanelTitle').textContent = copy.heroPanelTitle;
    copy.heroStats.forEach((item, index) => {
      document.getElementById(`heroStat${index + 1}Value`).textContent = item[0];
      document.getElementById(`heroStat${index + 1}Label`).textContent = item[1];
    });
    document.getElementById('jumpRoadmapBtn').textContent = copy.jumpRoadmap;
    document.getElementById('jumpSimulatorBtn').textContent = copy.jumpSimulator;
    document.getElementById('glossaryHint').textContent = copy.glossaryHint;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === app.lang));
  }

  function renderRoadmap() {
    const copy = t();
    const state = getProgressState();
    const done = Object.values(state).filter(Boolean).length;
    const total = copy.coursePanels.length;
    document.getElementById('roadmapLabel').textContent = copy.roadmapLabel;
    document.getElementById('roadmapTitle').textContent = copy.roadmapTitle;
    document.getElementById('roadmapIntro').textContent = copy.roadmapIntro;
    document.getElementById('roadmapProgressText').textContent = copy.roadmapProgress(done, total);
    document.getElementById('resetProgressBtn').textContent = copy.resetProgress;
    document.getElementById('roadmapFill').style.width = `${(done / total) * 100}%`;

    const tabs = document.getElementById('courseTabs');
    const panels = document.getElementById('coursePanels');
    tabs.innerHTML = '';
    panels.innerHTML = '';

    copy.roadmapTabs.forEach((label, index) => {
      const btn = document.createElement('button');
      btn.className = `course-tab mono ${app.currentCourse === index ? 'active' : ''}`;
      btn.textContent = label;
      btn.onclick = () => {
        app.currentCourse = index;
        renderRoadmap();
      };
      tabs.appendChild(btn);
    });

    copy.coursePanels.forEach((panel, index) => {
      const section = document.createElement('div');
      section.className = `course-panel ${app.currentCourse === index ? 'active' : ''}`;
      section.innerHTML = `
        <div class="lesson-grid">
          <div class="lesson-block">
            <div class="card-label mono">${panel.leftLabel}</div>
            <div class="card-title">${panel.title}</div>
            <div class="list">${panel.leftList.map(item => `<div>${item}</div>`).join('')}</div>
          </div>
          <div class="lesson-block">
            <div class="card-label mono">${panel.rightLabel}</div>
            <div class="card-title">${panel.title}</div>
            <div class="list">${panel.rightList.map(item => `<div>${item}</div>`).join('')}</div>
          </div>
        </div>
        <div style="margin-top:1rem;">
          <button class="btn primary mono" data-course-done="${index}">${state[index] ? '✓ ' : ''}${app.lang === 'zh' ? '标记已理解' : app.lang === 'en' ? 'Mark understood' : 'Als verstanden markieren'}</button>
        </div>
      `;
      panels.appendChild(section);
    });

    panels.querySelectorAll('[data-course-done]').forEach(btn => {
      btn.onclick = () => markCourseDone(Number(btn.dataset.courseDone));
    });
  }

  function renderFlow() {
    const copy = t();
    document.getElementById('mapLabel').textContent = copy.mapLabel;
    document.getElementById('mapTitle').textContent = copy.mapTitle;
    document.getElementById('mapIntro').textContent = copy.mapIntro;
    document.getElementById('scenarioLabel').textContent = copy.scenarioLabel;
    document.getElementById('scenarioTitle').textContent = copy.scenarioTitle;
    document.getElementById('scenarioText').textContent = copy.scenarioText;
    document.getElementById('relationshipLabel').textContent = copy.relationshipLabel;
    document.getElementById('relationshipList').innerHTML = copy.relationshipList.map(item => `<div>${item}</div>`).join('');

    const row = document.getElementById('flowRow');
    row.innerHTML = '';
    modules.forEach((mod, index) => {
      const item = copy.flow[mod.id];
      const step = document.createElement('div');
      step.className = `flow-step ${mod.color} ${app.currentModule === mod.id ? 'active' : ''}`;
      step.innerHTML = `
        <div class="flow-box">
          <div class="card-label mono">${item[0]}</div>
          <h3>${item[1]}</h3>
          <p>${item[2]}</p>
        </div>
      `;
      step.onclick = () => {
        app.currentModule = mod.id;
        renderFlow();
      };

        const arrow = document.createElement('div');
        arrow.className = 'flow-arrow';
        arrow.textContent = '→';
        row.appendChild(arrow);
      }
    });

    const details = document.getElementById('moduleDetails');
    details.innerHTML = '';
    modules.forEach(mod => {
      const detail = copy.moduleDetails[mod.id];
      const el = document.createElement('div');
      el.className = `module-detail ${app.currentModule === mod.id ? 'active' : ''}`;
      el.id = `module-${mod.id}`;
      el.innerHTML = `
        <div class="detail-head">
          <div>
            <div class="detail-title">${detail.title}</div>
            <p style="color:var(--text-dim); margin-top:0.45rem;">${detail.summary}</p>
          </div>
          <div class="tag-row">${detail.tags.map(tag => `<span class="tag ${mod.color} mono">${tag}</span>`).join('')}</div>
        </div>
        <div class="detail-grid">
          <div class="content-card" style="padding:1rem;">
            <div class="card-label mono">${detail.leftTitle}</div>
            <div class="list">${detail.leftList.map(item => `<div>${item}</div>`).join('')}</div>
          </div>
          <div class="content-card" style="padding:1rem;">
            <div class="card-label mono">${detail.rightTitle}</div>
            <div class="micro-tags">${detail.tcodes.map(code => `<span class="tcode-tag mono" title="${detail.summary}">${code}</span>`).join('')}</div>
          </div>
        </div>
      `;
      details.appendChild(el);
    });
  }

  function renderTable() {
    const copy = t();
    document.getElementById('dataLabel').textContent = copy.dataLabel;

  function renderSimulator() {
    const copy = t();
    document.getElementById('simLabel').textContent = copy.simLabel;
    document.getElementById('simTitle').textContent = copy.simTitle;
    document.getElementById('simIntro').textContent = copy.simIntro;
    document.getElementById('simSafetyBadge').textContent = copy.simSafetyBadge;
    document.getElementById('sapWindowTitle').textContent = copy.sapWindowTitle;
    document.getElementById('sapToolbar1').textContent = copy.sapToolbar[0];
    document.getElementById('sapToolbar2').textContent = copy.sapToolbar[1];
    document.getElementById('sapToolbar3').textContent = copy.sapToolbar[2];
    document.getElementById('sapToolbar4').textContent = copy.sapToolbar[3];
    document.getElementById('sapNavTitle').textContent = copy.sapNavTitle;
    document.getElementById('sapCommandLabel').textContent = copy.sapCommandLabel;
    document.getElementById('runSimBtn').textContent = copy.runSim;
    document.getElementById('simGoalTitle').textContent = copy.simGoalTitle;
    document.getElementById('simHowTitle').textContent = copy.simHowTitle;
    document.getElementById('simFilterTitle').textContent = copy.simFilterTitle;
    document.getElementById('safeTitle1').textContent = copy.safeTitle1;
    document.getElementById('safeText1').textContent = copy.safeText1;
    document.getElementById('safeTitle2').textContent = copy.safeTitle2;
    document.getElementById('safeText2').textContent = copy.safeText2;

    const simTabLabels = copy.simTabs;
    document.getElementById('simTabs').innerHTML = simScreens.map((sim, index) => `
      <button class="sim-tab mono ${app.currentSim === sim.id ? 'active' : ''}" data-sim="${sim.id}">${simTabLabels[index]}</button>
    `).join('');
    document.querySelectorAll('.sim-tab').forEach(btn => {
      btn.onclick = () => {
        app.currentSim = btn.dataset.sim;
        renderSimulator();
      };
    });

    const screen = copy.sims[app.currentSim];
    document.getElementById('simCommand').value = app.currentSim.toUpperCase();
    document.getElementById('simGoalText').textContent = screen.goal;
    document.getElementById('simHowText').textContent = screen.how;
    document.getElementById('sapTree').innerHTML = screen.tree.map((item, idx) => `<div class="${idx === screen.tree.length - 1 ? 'active' : ''}">${item}</div>`).join('');
    document.getElementById('simFilters').innerHTML = screen.filters.map(filter => `
      <div class="sap-panel">
        <h4>${filter[0]}</h4>
        <div class="mono">${filter[1]}</div>
      </div>
    `).join('');
    document.getElementById('simTableHead').innerHTML = `<tr>${screen.headers.map(item => `<th>${item}</th>`).join('')}</tr>`;
    document.getElementById('simTableBody').innerHTML = screen.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('');
  }

  function renderCases() {
    const copy = t();
    document.getElementById('caseLabel').textContent = copy.caseLabel;
    document.getElementById('caseTitle').textContent = copy.caseTitle;
    document.getElementById('caseIntro').textContent = copy.caseIntro;
    document.getElementById('caseGrid').innerHTML = copy.caseCards.map(card => `
      <div class="case-card">
        <div class="card-label mono">STEP ${card[0]}</div>
        <div class="card-title">${card[1]}</div>
        <p style="color:var(--text-dim);">${card[2]}</p>
      </div>
    `).join('');
  }

  function ensureAnsweredLength() {
    const needed = t().questions.length;
    if (!Array.isArray(app.answered) || app.answered.length !== needed) {
      app.answered = new Array(needed).fill(false);
      saveQuizState();
    }
  }

  function renderQuiz() {
    const copy = t();
    ensureAnsweredLength();
    document.getElementById('quizLabel').textContent = copy.quizLabel;
    document.getElementById('quizTitle').textContent = copy.quizTitle;
    document.getElementById('quizIntro').textContent = copy.quizIntro;
    document.getElementById('quizPrevBtn').textContent = copy.quizPrev;
    document.getElementById('quizNextBtn').textContent = app.currentQuestion === copy.questions.length - 1 ? copy.quizDone : copy.quizNext;
    document.getElementById('quizPrevBtn').disabled = app.currentQuestion === 0;
    document.getElementById('quizNextBtn').disabled = !app.answered[app.currentQuestion];
    document.getElementById('quizProgressText').textContent = copy.quizProgress(app.currentQuestion + 1, copy.questions.length);
    document.getElementById('quizFill').style.width = `${((app.currentQuestion + 1) / copy.questions.length) * 100}%`;

    const q = copy.questions[app.currentQuestion];
    const selected = typeof app.answered[app.currentQuestion] === 'number' ? app.answered[app.currentQuestion] : null;
    const isDone = selected !== null && selected !== false;
    document.getElementById('quizBody').innerHTML = `
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-context">${q.context}</div>
      <div class="quiz-options">
        ${q.options.map((opt, idx) => {
          let cls = 'quiz-option';
          if (isDone && idx === q.correct) cls += ' correct';
          if (isDone && idx === selected && idx !== q.correct) cls += ' wrong';
          return `<button class="${cls}" data-answer="${idx}" ${isDone ? 'disabled' : ''}>${opt}</button>`;
        }).join('')}
      </div>
      <div class="quiz-feedback ${isDone ? 'show' : ''}" id="quizFeedback">${isDone ? (selected === q.correct ? q.correctText : q.wrongText) : ''}</div>
    `;

    document.querySelectorAll('[data-answer]').forEach(btn => {
      btn.onclick = () => answerQuestion(Number(btn.dataset.answer));
    });
  }

  function answerQuestion(idx) {
    const q = t().questions[app.currentQuestion];
    app.answered[app.currentQuestion] = idx;
    saveQuizState();
    renderQuiz();
    const fb = document.getElementById('quizFeedback');
    fb.textContent = idx === q.correct ? q.correctText : q.wrongText;
  }

  function renderFooter() {
    const copy = t();
    document.getElementById('footerLeft').textContent = copy.footerLeft;
    document.getElementById('footerRight').textContent = copy.footerRight;
  }

  function renderAll() {
    renderHero();
    renderRoadmap();
    renderFlow();
    renderTable();
    renderSimulator();
    renderCases();
    renderQuiz();
    renderFocus();
    renderFooter();
    enhanceGlossary(document.querySelector('.hero'));
    enhanceGlossary(document.querySelector('main'));
    if (app.activeGlossaryId) openGlossary(app.activeGlossaryId);
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      app.lang = btn.dataset.lang;
      localStorage.setItem('sapOfflineLang', app.lang);
      app.currentQuestion = 0;
      renderAll();
    });
  });

  document.getElementById('jumpRoadmapBtn').onclick = () => document.getElementById('roadmapSection').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('jumpSimulatorBtn').onclick = () => document.getElementById('simulatorSection').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('resetProgressBtn').onclick = resetProgress;
  document.getElementById('runSimBtn').onclick = renderSimulator;
  document.getElementById('glossaryCloseBtn').onclick = closeGlossary;
  document.getElementById('quizPrevBtn').onclick = () => {
    if (app.currentQuestion > 0) {
      app.currentQuestion--;
      renderQuiz();
    }
  };
  document.getElementById('quizNextBtn').onclick = () => {
    if (app.currentQuestion < t().questions.length - 1) {
      app.currentQuestion++;
      renderQuiz();
    }
  };

  window.addEventListener('scroll', () => {
    const winScroll = document.documentElement.scrollTop || document.body.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    document.getElementById('progressBar').style.width = `${height ? (winScroll / height) * 100 : 0}%`;
  });

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('main section').forEach(section => observer.observe(section));

  document.addEventListener('click', event => {
    const term = event.target.closest('.glossary-term');
    if (term) {
      openGlossary(term.dataset.glossaryId);
      return;
    }
    const card = event.target.closest('#glossaryCard');
    if (!card && !event.target.closest('.glossary-term')) {
      const clickedLink = event.target.closest('a');
      if (!clickedLink) closeGlossary();
    }
  });

  renderAll();
  // ✅ Handle deep link to module (#module-mm, #module-scm, etc.)
window.addEventListener('load', () => {
  const hash = window.location.hash;

  if (hash && hash.startsWith('#module-')) {
    const moduleId = hash.replace('#module-', '');

    // 1️⃣ 切换到对应模块
    if (['mm', 'scm', 'fi', 'cust'].includes(moduleId)) {
      app.currentModule = moduleId;
      renderFlow();
    }

    // 2️⃣ 等 DOM 更新完成后再滚动
    requestAnimationFrame(() => {
      const target = document.getElementById(`module-${moduleId}`);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  }
});
</script>
